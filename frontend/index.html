<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetOS | Drone Delivery Manager</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="app-grid" class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>FleetOS</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#drones" class="nav-item active">Drones</a>
                <a href="#missions" class="nav-item">Flight Missions</a>
                <a href="#pilots" class="nav-item">Pilots</a>
            </nav>
        </aside>
        
        <div class="main-wrapper">
            
            <header class="top-bar">
                <h1 id="page-title">Drone Roster</h1>
                <div class="top-bar-controls">
                    <button id="open-modal-btn" class="btn btn-primary" style="height: 36px; padding: 0 16px; font-size: 13px;">+ Add Drone</button>
                    
                    <input type="text" placeholder="Search fleet..." class="search-input">
                    <div id="clock" class="clock">00:00</div>
                </div>
            </header>
            
            <main id="content-area" class="content-area">
                </main>

        </div> </div> <div id="drone-modal" class="modal-overlay" style="display: none;"> 
        <div class="modal-content">
            <h2 style="margin-bottom: 24px;">Register New Drone</h2>
            <div class="form-group">
                <label>Drone Model</label>
                <input type="text" id="drone-model-input" class="input-field" placeholder="e.g., DJI Inspire 3">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 32px; justify-content: flex-end;">
                <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-drone-btn" class="btn btn-primary">Save Drone</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
