# nginx.conf

server {
    listen 80;
    server_name localhost;

    # 1. Serve the Vanilla JS Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Fallback to index.html for Single Page Application routing (if needed)
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy for the Spring Boot Backend
    location /api/ {
        # 'fleet-api' is the container_name from your docker-compose.yml
        proxy_pass http://fleet-api:8080/api/;
        
        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle CORS preflight (if Nginx needs to handle it)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}